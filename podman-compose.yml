version: "3"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app:Z
      - /app/node_modules
      - /app/.vite
    environment:
      - VITE_API_URL=http://backend:3000
      - HOST=0.0.0.0
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app:Z
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      - HOST=0.0.0.0
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
